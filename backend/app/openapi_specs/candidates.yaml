openapi: "3.0.3"
info:
  title: Candidate Pipeline API
  description: |
    Tracks candidates through the recruiting pipeline. A candidate is linked to
    a specific requisition and moves through stages: Applied → Phone Screen
    Scheduled → Phone Screen Completed → Onsite Scheduled → Onsite Completed →
    Offer Extended → Offer Accepted/Declined → Withdrawn. Use this API to get
    pipeline health, identify candidates near offer, and track sourcing mix.
  version: "1.0.0"

servers:
  - url: /internal/v1/candidates

paths:
  /:
    get:
      operationId: listCandidates
      summary: List and filter candidates
      description: |
        Filter by req_id, current_stage, source (External/Internal/Agency/Referral),
        org, job_family, level_applied, hiring_manager_id, recruiter_id,
        location_preference, and days_in_pipeline_gt.
      parameters:
        - name: req_id
          in: query
          schema: { type: string }
        - name: current_stage
          in: query
          schema: { type: string }
          description: "Applied, Phone Screen Scheduled, Phone Screen Completed, Onsite Scheduled, Onsite Completed, Offer Extended, Offer Accepted, Offer Declined, Withdrawn"
        - name: source
          in: query
          schema: { type: string, enum: [External, Internal, Agency, Referral] }
        - name: org
          in: query
          schema: { type: string }
        - name: job_family
          in: query
          schema: { type: string }
        - name: level_applied
          in: query
          schema: { type: string }
        - name: hiring_manager_id
          in: query
          schema: { type: string }
        - name: recruiter_id
          in: query
          schema: { type: string }
        - name: location_preference
          in: query
          schema: { type: string }
        - name: days_in_pipeline_gt
          in: query
          schema: { type: integer }
          description: Candidates in pipeline longer than N days
        - name: limit
          in: query
          schema: { type: integer, default: 100 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: Paginated list of candidates

  /pipeline/summary:
    get:
      operationId: pipelineSummary
      summary: Pipeline health summary by stage and source
      description: |
        Returns total candidates, breakdown by stage, breakdown by source, and
        count of candidates actively in the interview pipeline (post-apply).
        Optionally filter by org and job_family.
      parameters:
        - name: org
          in: query
          schema: { type: string }
        - name: job_family
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Pipeline summary with stage and source breakdown

  /pipeline/near-offer:
    get:
      operationId: nearOfferCandidates
      summary: Candidates at Onsite Completed or Offer Extended stage
      description: |
        Returns candidates closest to receiving or having received an offer.
        Sorted by days_in_pipeline descending (longest-waiting first).
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Candidates near offer

  /{candidate_id}:
    get:
      operationId: getCandidate
      summary: Get a single candidate by ID
      parameters:
        - name: candidate_id
          in: path
          required: true
          schema: { type: string }
          description: "Format: CAND-NNNN"
      responses:
        "200":
          description: Candidate detail

components:
  schemas:
    Candidate:
      type: object
      properties:
        candidate_id: { type: string }
        req_id: { type: string }
        name: { type: string }
        email: { type: string }
        current_stage: { type: string }
        source: { type: string }
        applied_date: { type: string, format: date }
        last_updated: { type: string, format: date }
        recruiter_id: { type: string }
        hiring_manager_id: { type: string }
        level_applied: { type: string }
        job_family: { type: string }
        location_preference: { type: string }
        org: { type: string }
        days_in_pipeline: { type: integer }
        gender: { type: string }
